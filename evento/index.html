<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>¡1500 GRACIAS!</title>
  <link rel="icon" href="assets/favicon.png" />

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <script defer src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

  <!-- Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"/>

  <!-- Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&family=Space+Grotesk:wght@400;600;700&display=swap" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Anton&display=swap" rel="stylesheet"/>

  <style>
/* ===== Reset & Base ===== */
*{box-sizing:border-box}
:root{
  --brand:#19248B;
  --text:#eaf0ff;
  --border:rgba(255,255,255,.18);
  --navh:70px;
}
@media (max-width:576px){
  :root{ --navh:66px }
}

html,body{
  height:100%; margin:0; overflow-x:hidden; scroll-behavior:smooth; color:var(--text);
  background:
    radial-gradient(1200px 800px at 80% 20%, rgba(154,107,255,0.15), transparent 60%),
    radial-gradient(1000px 600px at 10% 80%, rgba(25,36,139,0.25), transparent 60%),
    linear-gradient(180deg, #0b0f2a 0%, #0a0b14 100%);
  background-size:200% 200%;
  background-attachment:fixed;
  animation:gradientFlow 25s ease-in-out infinite alternate;
  font-family:"Space Grotesk",system-ui;
}
@keyframes gradientFlow{0%{background-position:0% 50%}100%{background-position:100% 50%}}

.container-narrow {
  padding-inline: 1rem;
}

.gallery img {
  max-width: 100%;
  height: auto;
}

.btn-brand{
  background:linear-gradient(90deg,var(--brand),#0f1976);
  border:0;color:#fff;font-weight:800;
  box-shadow:0 12px 40px rgba(25,36,139,.35)
}

.hero{
  position: relative;
  min-height: 100svh;
  display: grid;
  place-items: center;
  padding-block: clamp(48px, 8vh, 96px);
  overflow: hidden;
  text-align: center;
}

.hero-title{
  margin: 0 auto .75rem;
  text-transform: uppercase;
  font-family:"Anton",sans-serif;
  font-weight:900;
  letter-spacing:.01em;
  line-height:1;
  text-wrap: balance;
  text-shadow:none !important;
  padding: 1rem;
}

.hero-title span{
  display:block;
  background:none !important;
  -webkit-background-clip:initial !important;
  background-clip:initial !important;
  color:#ffffff !important;
}

.hero-title .n{ font-size: clamp(4rem, 22vw, 22rem); }
.hero-title .g{ font-size: clamp(3rem, 12vw, 12rem); letter-spacing:.02em; }
.hero .lead{ font-size: clamp(1rem,2.2vw,1.5rem); max-width: 900px; margin-inline: auto; }

@media (max-width: 576px){
  .hero-title .n{ font-size: clamp(5rem, 32vw, 14rem); }
  .hero-title .g{ font-size: clamp(3.5rem, 20vw, 10rem); }
  .hero-title{ line-height: 1.2; }
}

.bg-video{
  position:absolute; inset:0; width:100%; height:100%;
  object-fit:cover; opacity:.55; filter:saturate(1.15) contrast(1.05);
}
.hero-overlay{
  position:absolute; inset:0;
  background:
    radial-gradient(1200px 800px at 20% 20%, rgba(25,36,139,.45), transparent 60%),
    radial-gradient(1000px 600px at 80% 80%, rgba(154,107,255,.20), transparent 60%);
}

.gallery .item{position:relative; overflow:hidden; border-radius:14px; border:1px solid var(--border)}
.gallery img{
  width:100%; aspect-ratio:3/2; object-fit:cover;
  transition:transform .4s ease;
}
.gallery .item:hover img{ transform:scale(1.04); }

.bg-global{
  position:fixed; top:0; left:0; width:100%; height:100%;
  object-fit:cover; opacity:.10;
  filter:brightness(.9) saturate(1.05); z-index:0; pointer-events:none
}

body, header, section, footer, .navbar{
  position:relative; z-index:1; background:transparent!important
}

.chips{
  display:flex; flex-wrap:wrap; gap:.5rem; justify-content:center;
}
.chip{
  display:inline-flex; align-items:center; gap:.5rem;
  padding:.55rem 1rem;
  border-radius:9999px;
  border:1px solid var(--border);
  background:rgba(255,255,255,.08);
  color:var(--text);
  line-height:1; font-weight:600;
  backdrop-filter:blur(6px);
  box-shadow:inset 0 1px 0 rgba(255,255,255,.10), 0 6px 20px rgba(0,0,0,.12);
  transition:transform .15s ease, border-color .15s ease, background .15s ease;
}
.chip i{ font-size:.95em; opacity:.95; }
.chip:hover{
  transform:translateY(-1px);
  border-color:rgba(154,107,255,.45);
  background:linear-gradient(90deg, rgba(154,107,255,.12), rgba(60,242,255,.10));
}
@media (max-width:576px){
  .chip{ width:100%; justify-content:center; }
}
.section-title { margin-top: 2rem; }
  </style>
</head>

<body>

<video id="bgVideo" class="bg-global" autoplay muted loop playsinline preload="auto">
  <source src="assets/video/alsina5.mp4" type="video/mp4">
</video>

<header id="home" class="hero text-white">
  <video class="bg-video" id="heroVideo" autoplay muted loop playsinline preload="metadata">
    <source src="assets/video/hero2.mp4" type="video/mp4"/>
  </video>
  <div class="hero-overlay"></div>
  <div class="container container-narrow position-relative" style="z-index:1;">
    <div class="d-flex flex-wrap gap-2 mb-3 justify-content-center">
      <span class="chip"><i class="fa-solid fa-star"></i> ¡El evento más grande de la abogacía!</span>
      <span class="chip"><i class="fa-solid fa-location-dot"></i> Palacio Alsina</span>
      <span class="chip"><i class="fa-regular fa-calendar-check"></i> Noviembre 2025</span>
    </div>
    <h1 class="hero-title" aria-label="1500 gracias">
      <span class="n">1500</span>
      <span class="g">¡GRACIAS!</span>
    </h1>
    <p class="lead mb-4">
      A todas las personas que nos acompañaron: gracias por ser parte.  
      <br>Nos volvemos a encontrar en 2026.
    </p>
    <a href="#album" class="btn btn-brand btn-lg">
      <i class="fa-regular fa-images me-2"></i>Ver fotos
    </a>
  </div>
</header>

<section id="album">
  <div class="container container-narrow">
    <h2 class="section-title mb-4">Álbum de fotos</h2>
    <div id="gallery" class="row g-3 gallery"></div>
    <div class="text-center mt-3">
      <button id="btnMore" class="btn btn-ghost"><i class="fa-solid fa-plus me-2"></i>Cargar más</button>
    </div>
    <div id="sentinel" style="height:1px;"></div>
  </div>
</section>

<!-- Modal de imagen -->
<div class="modal fade" id="imageModal" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog modal-dialog-centered modal-lg">
    <div class="modal-content bg-dark border-0">
      <div class="modal-body p-0">
        <img id="modalImage" src="" alt="" class="img-fluid rounded">
      </div>
    </div>
  </div>
</div>

<footer class="py-4">
  <div class="container d-flex flex-column flex-md-row justify-content-between align-items-center gap-3">
    <div class="small text-center text-md-start">
      <span id="year"></span> AGAE — Asociación Gremial de la Abogacía del Estado
    </div>
    <div class="d-flex align-items-center gap-3">
      <a href="https://www.instagram.com/agaeok" target="_blank" class="text-light fs-5"><i class="fa-brands fa-instagram"></i></a>
      <a href="https://www.facebook.com/rubenramosok" target="_blank" class="text-light fs-5"><i class="fa-brands fa-facebook"></i></a>
      <a href="https://x.com/agaeok" target="_blank" class="text-light fs-5"><i class="fa-brands fa-x-twitter"></i></a>
    </div>
  </div>
</footer>

<script>
document.getElementById("year").textContent = new Date().getFullYear();
document.addEventListener("DOMContentLoaded", () => {
  const hv = document.getElementById("heroVideo");
  if (hv) hv.playbackRate = 0.25;
});
</script>

<script>
(()=>{
  const COUNT = 236;
  const DIR = "assets/img/evento";
  const BASE = "AGAE";
  const EXT = "jpg";
  const BATCH = 48;
  const CONCURRENCY = 12;

  const file = i => `${DIR}/${BASE}${i}.${EXT}`;

  const candidates = Array.from({length:COUNT},(_,i)=>({
    full:file(i+1),
    thumb:file(i+1),
    title:`AGAE — #${i+1}`,
    index:i+1
  }));

  async function exists(url){
    try{
      const r = await fetch(url,{method:"HEAD"});
      return r.ok;
    }catch{ return false; }
  }

  async function filterValid(list){
    const valid=[]; let i=0;
    async function worker(){
      while(i < list.length){
        const current=list[i++];
        if(await exists(current.full)) valid.push(current);
      }
    }
    await Promise.all(Array.from({length:CONCURRENCY}, worker));
    return valid.sort((a,b)=>a.index-b.index);
  }

  const $gallery=document.getElementById("gallery");
  const $btn=document.getElementById("btnMore");
  const $sentinel=document.getElementById("sentinel");

  let photos=[]; let cursor=0;

  function render(){
    if(cursor>=photos.length) return;
    const end=Math.min(cursor+BATCH,photos.length);
    const frag=document.createDocumentFragment();

    for(let i=cursor;i<end;i++){
      const p=photos[i];
      const col=document.createElement("div");
      col.className="col-6 col-md-4 col-lg-3";

      const a=document.createElement("a");
      a.href="#";
      a.className="item";
      a.addEventListener("click", e => {
        e.preventDefault();
        document.getElementById("modalImage").src = p.full;
        new bootstrap.Modal(document.getElementById('imageModal')).show();
      });

      const img=document.createElement("img");
      img.src=p.thumb;
      img.alt=p.title;
      img.loading="lazy";
      img.width=600; img.height=400;
      img.onerror=()=>col.remove();

      a.appendChild(img);
      col.appendChild(a);
      frag.appendChild(col);
    }

    $gallery.appendChild(frag);
    cursor=end;
    if(cursor>=photos.length) $btn.style.display="none";
  }

  function initInfinite(){
    new IntersectionObserver(e=>{
      if(e[0].isIntersecting) render();
    },{rootMargin:"600px 0px"}).observe($sentinel);
  }

  (async ()=>{
    photos = await filterValid(candidates);
    render();
    initInfinite();
  })();

  $btn.addEventListener("click", render);
})();
</script>

</body>
</html>
