<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Formulario de Afiliación - AGAE</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700&family=Open+Sans&display=swap" rel="stylesheet">
  <link rel="icon" href="assets/favicon.png" />

  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      height: 100dvh;
      overflow: hidden;
      font-family: 'Open Sans', sans-serif;
      background-color: #19248B;
      color: white;
    }

    .split {
      display: flex;
      height: 100dvh;
      overflow: hidden;
    }

    .left {
      flex: 0.4;
      background-color: #19248B;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 40px;
    }

    .left .content {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      width: 100%;
    }

    .left h1 {
      font-family: 'Montserrat', sans-serif;
      font-size: 3rem;
      margin-bottom: 20px;
      font-weight: bold;
    }

    .left p {
      font-size: 1.2rem;
      opacity: 0.9;
      max-width: 400px;
      margin-bottom: 0;
    }

    .right {
      flex: 0.6;
      background-color: #f8f9fa;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px;
    }

    .form-select {
      width: 100%;
      max-width: 100%;
      font-size: 1rem;
    }

    @media (max-width: 576px) {
      .form-select {
        font-size: 0.95rem;
      }
    }

    .form-container {
      background-color: white;
      border-radius: 16px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.1);
      padding: 40px;
      width: 100%;
      max-width: 500px;
    }

    .form-container h2 {
      font-family: 'Montserrat', sans-serif;
      color: #19248B;
      text-align: center;
      margin-bottom: 30px;
      font-weight: bold;
    }

    .form-control, .form-select {
      border-radius: 8px;
      padding: 12px;
      margin-bottom: 20px;
    }

    .form-control:focus, .form-select:focus {
      border-color: #19248B;
      box-shadow: 0 0 0 0.2rem rgba(25,36,139,0.25);
    }

    input::placeholder {
      text-transform: none;
    }

    .btn-custom {
      background-color: #19248B;
      border-color: #19248B;
      color: white;
      border-radius: 8px;
      padding: 12px;
      width: 100%;
      font-size: 1.1rem;
      font-weight: 600;
      margin-top: 10px;
    }

    .btn-custom:hover {
      background-color: #3a4dbd;
      border-color: #3a4dbd;
    }

    select.form-select:invalid {
      color: #4B5054;
    }

    @media (max-width: 768px) {
      .split {
        flex-direction: column;
        height: auto;
      }

      .left, .right {
        padding: 30px;
      }

      .left h1 {
        font-size: 2.4rem;
      }

      html, body {
        overflow: auto;
        height: auto;
      }
    }

    @media (max-height: 800px) {
      .left, .right {
        padding: 20px;
      }

      .form-container {
        padding: 30px 20px;
      }
    }
  </style>
</head>
<body>

  <div class="split">
    <div class="left">
      <div class="content">
        <img src="assets/unite.png" alt="Logo AGAE" style="max-width: 200px; margin-bottom: 20px;">
        <h1>¡Unite a la AGAE!</h1>
        <p>Completá tus datos para iniciar tu afiliación y ser parte de nuestra comunidad.</p>
      </div>
    </div>

    <div class="right">
      <div class="form-container">
        <h2>Comenzá tu afiliación ahora</h2>
        <form>
          <div class="mb-3">
            <input type="text" style="text-transform: capitalize;" class="form-control" placeholder="Apellido/s *" required>
          </div>
          <div class="mb-3">
            <input type="text" style="text-transform: capitalize;" class="form-control" placeholder="Nombre/s *" required>
          </div>
          <div class="mb-3">
            <input type="email" class="form-control" placeholder="Email *" required pattern="^[a-z0-9._%+-]+@[a-z0-9.-]+\.[a-z]{2,}$" oninput="this.value = this.value.toLowerCase()">
          </div>
          <div class="mb-3">
            <input type="tel" class="form-control" placeholder="Whatsapp *" id="whatsapp" inputmode="numeric" pattern="[0-9]*" required   maxlength="14" required>
          </div>
          <div class="mb-3">
            <input type="text" class="form-control" id="dni" placeholder="DNI *" inputmode="numeric" required>
          </div>
          <button type="submit" class="btn-custom">Enviar Solicitud</button>
        </form>
      </div>
    </div>
  </div>

  <script>
    const dniInput = document.getElementById("dni");
    dniInput.addEventListener("input", function(e) {
      // Eliminar caracteres que no sean números
      let value = e.target.value.replace(/\D/g, "");

      // Limitar a 8 dígitos
      if (value.length > 8) {
        value = value.slice(0, 8);
      }

      // Agregar puntos de miles
      value = value.replace(/\B(?=(\d{3})+(?!\d))/g, ".");
      e.target.value = value;
    });
  </script>

  <script>
  const whatsappInput = document.getElementById("whatsapp");

  whatsappInput.addEventListener("input", function (e) {
    // Eliminar todo lo que no sea número
    let value = e.target.value.replace(/\D/g, "");

    // Limitar a 10 dígitos
    if (value.length > 14) {
      value = value.slice(0, 14);
    }

    e.target.value = value;
  });
</script>

</body>
</html>
